apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mine-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/100-hours-a-week/4-team-IMYME-cloud.git

    # 테스트용 브랜치
    targetRevision: feat/k8s
    path: k8s/prod/mine
  destination:
    server: https://kubernetes.default.svc

    # 테스트용 네임스페이스
    namespace: mine-app-test
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
