# 테스트용 네임스페이스
namespace: mine-app-test

frontend:
  enabled: true
  replicaCount: 2
  containerPort: 3000

  image:
    repository: 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-frontend
    tag: "10db735e0581316df9bc6db9fbdbef219a7aff27"
    pullPolicy: IfNotPresent

  service:
    port: 3000

  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "600m"
      memory: "1Gi"

  secret:
    enabled: true
    name: frontend-secret

  probes:
    readinessPath: /api/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

backend:
  enabled: true
  replicaCount: 3
  containerPort: 8080

  image:
    repository: 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-backend
    tag: "f7be398a3f0a74d3da9bdd0fc26443ecfeecec11"
    pullPolicy: IfNotPresent

  service:
    port: 8080

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  secret:
    enabled: true
    name: backend-secret

  probes:
    # readinessPath는 수정필요
    readinessPath: /server/health
    livenessPath: /server/health
    startupPath: /server/health

    readiness:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3

    startup:
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 30

ai:
  enabled: true
  replicaCount: 2
  containerPort: 8000

  image:
    repository: 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-ai
    tag: "0d5e33daacc1f1c22400aca5344b46644958f64b"
    pullPolicy: IfNotPresent

  service:
    port: 8000

  resources:
    requests:
      cpu: "400m"
      memory: "512Mi"
    limits:
      cpu: "600m"
      memory: "1Gi"

  secret:
    enabled: true
    name: ai-secret

  probes:
    readinessPath: /ai/health
    livenessPath: /ai/health
    startupPath: /ai/health

    readiness:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3

    startup:
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 60
