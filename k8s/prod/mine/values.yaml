namespace: mine-app

frontend:
  enabled: true
  replicaCount: 2
  containerPort: 3000

  image:
    repository: 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-frontend
    tag: "aaab6b89977d1a3db520b23bea7586de42c8a49e"
    pullPolicy: IfNotPresent

  service:
    port: 80

  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "600m"
      memory: "1Gi"

  secret:
    enabled: true
    name: frontend-secret

  probes:
    readinessPath: /api/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

backend:
  enabled: true
  replicaCount: 3
  containerPort: 8080

  image:
    repository: 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-backend
    tag: "25798c33f63a6cbec8e1752642f1b6e64c452f6b"
    pullPolicy: IfNotPresent

  service:
    port: 80

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  secret:
    enabled: true
    name: backend-secret

  probes:
    # readinessPath는 수정필요
    readinessPath: /actuator/health
    livenessPath: /actuator/health
    startupPath: /actuator/health

    readiness:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3

    startup:
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 30

ai:
  enabled: true
  replicaCount: 2
  containerPort: 8000

  image:
    repository: 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-ai
    tag: "4176acba14b8867af11e79122baf20c921858fc4"
    pullPolicy: IfNotPresent

  service:
    port: 80

  resources:
    requests:
      cpu: "400m"
      memory: "512Mi"
    limits:
      cpu: "600m"
      memory: "1Gi"

  secret:
    enabled: true
    name: ai-secret

  probes:
    readinessPath: /ai/health
    livenessPath: /ai/health
    startupPath: /ai/health

    readiness:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3

    startup:
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 60

ingress:
  enabled: true
  className: traefik
  name: mine-app-ingress

  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: mine-app-mine-strip-prefix@kubernetescrd

  middleware:
    enabled: true
    name: mine-strip-prefix
    stripPrefixes:
      - /server
      - /ai

  paths:
    - path: /server
      pathType: Prefix
      serviceName: backend-svc
      servicePort: 80

    - path: /ai
      pathType: Prefix
      serviceName: ai-svc
      servicePort: 80

    - path: /ws
      pathType: Prefix
      serviceName: backend-svc
      servicePort: 80

    - path: /
      pathType: Prefix
      serviceName: frontend-svc
      servicePort: 80

ecrPullSecret:
  enabled: true

  secretName: ecr-registry-helper
  schedule: "0 */11 * * *"

  aws:
    region: ap-northeast-2
    accountId: "219268921033"

  registry:
    server: 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com
    username: AWS

  image:
    repository: public.ecr.aws/aws-cli/aws-cli
    tag: "2.27.41"

  serviceAccount:
    create: true
    name: ecr-secret-refresher

  rbac:
    create: true
