apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mine-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/100-hours-a-week/4-team-IMYME-cloud.git

    targetRevision: main
    path: k8s/prod/mine
  destination:
    server: https://kubernetes.default.svc

    namespace: mine-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
