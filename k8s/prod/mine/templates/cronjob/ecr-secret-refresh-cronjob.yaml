{{- if .Values.ecrPullSecret.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-refresh
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ .Values.ecrPullSecret.schedule | quote }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ .Values.ecrPullSecret.serviceAccount.name }}
          restartPolicy: OnFailure
          containers:
            - name: ecr-secret-refresh
              image: "{{ .Values.ecrPullSecret.image.repository }}:{{ .Values.ecrPullSecret.image.tag }}"
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  yum install -y tar gzip curl >/dev/null 2>&1 || true

                  KUBECTL_VERSION="v1.32.0"
                  curl -Lo /usr/local/bin/kubectl https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl
                  chmod +x /usr/local/bin/kubectl

                  TOKEN="$(aws ecr get-login-password --region {{ .Values.ecrPullSecret.aws.region }})"

                  kubectl create secret docker-registry {{ .Values.ecrPullSecret.secretName }} \
                    --docker-server={{ .Values.ecrPullSecret.registry.server }} \
                    --docker-username={{ .Values.ecrPullSecret.registry.username }} \
                    --docker-password="${TOKEN}" \
                    --namespace {{ .Values.namespace }} \
                    --dry-run=client -o yaml | kubectl apply -f -

                  echo "Refreshed ECR pull secret: {{ .Values.ecrPullSecret.secretName }}"
{{- end }}